<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>いまの地球の鼓動</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;600&display=swap');

:root {
  --bg: #06090f;
  --surface: #0d1117;
  --border: rgba(74,158,237,0.08);
  --earth: #4a9eed;
  --earth-dim: #2a5e8d;
  --gold: #c4a265;
  --gold-dim: rgba(196,162,101,0.15);
  --f1: #e8e8e8;
  --f2: #f0e060;
  --f3: #e85050;
  --f4: #50c878;
  --text: #c8cdd5;
  --dim: #5a6575;
  --green: #50c878;
  --warn: #e8a040;
  --err: #e85050;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* === 背景パーティクル === */
.bg-glow {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 0;
  background: 
    radial-gradient(ellipse at 30% 20%, rgba(74,158,237,0.03) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(196,162,101,0.02) 0%, transparent 60%);
}

.container {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  padding: 16px 12px 40px;
}

/* === ヘッダー === */
.mmm {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 3px;
  color: var(--gold);
  padding: 6px 0;
  border-top: 1px solid var(--gold-dim);
  border-bottom: 1px solid var(--gold-dim);
  margin-bottom: 16px;
  opacity: 0.8;
}

.title {
  text-align: center;
  font-size: 13px; font-weight: 300;
  color: var(--dim);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

/* === メインHz表示 === */
.hz-main {
  text-align: center;
  padding: 16px 0 8px;
}

.hz-main .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 64px; font-weight: 700;
  color: var(--earth);
  line-height: 1;
  text-shadow: 0 0 40px rgba(74,158,237,0.2);
}

.hz-main .unit {
  font-size: 18px; font-weight: 300;
  color: var(--earth-dim);
  margin-left: 4px;
}

.hz-main .label {
  font-size: 11px; color: var(--dim);
  margin-top: 4px;
}

/* === 4モード表示 === */
.modes {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin: 16px 0;
}

.mode-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 4px;
  text-align: center;
}

.mode-card .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  display: inline-block;
  margin-bottom: 4px;
}

.mode-card .mode-hz {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; font-weight: 600;
  color: var(--text);
  display: block;
}

.mode-card .mode-name {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 1px;
}

.mode-card .conf {
  font-size: 8px;
  color: var(--dim);
  font-family: 'JetBrains Mono', monospace;
}

/* === ステータス === */
.status-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 10px;
  color: var(--dim);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.status-row .badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 10px;
}

.badge.ok { background: rgba(80,200,120,0.1); color: var(--green); }
.badge.warn { background: rgba(232,160,64,0.1); color: var(--warn); }
.badge.err { background: rgba(232,80,80,0.1); color: var(--err); }

/* === 平均値 === */
.averages {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin: 12px 0;
}

.avg-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
}

.avg-card .avg-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px; font-weight: 600;
  color: var(--earth);
}

.avg-card .avg-label {
  font-size: 9px; color: var(--dim);
  margin-top: 2px;
}

/* === グラフ === */
.chart-section {
  margin: 20px 0 12px;
}

.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.chart-title {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 1px;
}

.chart-toggles {
  display: flex;
  gap: 4px;
}

.toggle-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 2px 8px;
  border: 1px solid;
  border-radius: 10px;
  background: transparent;
  cursor: pointer;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.toggle-btn.active { opacity: 1; }
.toggle-btn[data-mode="F1"] { color: var(--f1); border-color: var(--f1); }
.toggle-btn[data-mode="F2"] { color: var(--f2); border-color: var(--f2); }
.toggle-btn[data-mode="F3"] { color: var(--f3); border-color: var(--f3); }
.toggle-btn[data-mode="F4"] { color: var(--f4); border-color: var(--f4); }

.chart-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  position: relative;
  overflow: hidden;
}

canvas#chart {
  width: 100%;
  height: 200px;
  display: block;
}

.chart-time-labels {
  display: flex;
  justify-content: space-between;
  font-size: 8px;
  color: var(--dim);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 4px;
  padding: 0 4px;
}

/* === ソースインジケータ === */
.sources {
  margin: 16px 0;
  padding: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.source-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 10px;
}

.source-name { color: var(--dim); }

/* === フッター === */
.footer {
  text-align: center;
  margin-top: 20px;
  padding-top: 12px;
  border-top: 1px solid var(--gold-dim);
}

.footer .mmm-bottom {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 3px;
  color: var(--gold); opacity: 0.8;
}

.footer .time {
  font-size: 10px; color: var(--dim);
  margin-top: 6px;
  font-family: 'JetBrains Mono', monospace;
}

.footer .version {
  font-size: 8px; color: rgba(255,255,255,0.15);
  margin-top: 4px;
}

/* === ツールチップ === */
.tooltip {
  display: none;
  position: absolute;
  background: rgba(13,17,23,0.95);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text);
  pointer-events: none;
  z-index: 10;
  white-space: nowrap;
}

/* === アニメーション === */
@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.loading { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">

  <!-- ヘッダー -->
  <div class="mmm">⚡ MASTER MIND MEMBERS ⚡</div>
  <div class="title">いまの地球の鼓動</div>

  <!-- メインHz -->
  <div class="hz-main">
    <span class="value loading" id="mainHz">--.-</span><span class="unit">Hz</span>
    <div class="label">第1モード基本周波数</div>
  </div>

  <!-- 4モード -->
  <div class="modes">
    <div class="mode-card">
      <span class="dot" style="background:var(--f1)"></span>
      <span class="mode-hz" id="f1">--</span>
      <span class="mode-name">F1</span>
      <span class="conf" id="f1c"></span>
    </div>
    <div class="mode-card">
      <span class="dot" style="background:var(--f2)"></span>
      <span class="mode-hz" id="f2">--</span>
      <span class="mode-name">F2</span>
      <span class="conf" id="f2c"></span>
    </div>
    <div class="mode-card">
      <span class="dot" style="background:var(--f3)"></span>
      <span class="mode-hz" id="f3">--</span>
      <span class="mode-name">F3</span>
      <span class="conf" id="f3c"></span>
    </div>
    <div class="mode-card">
      <span class="dot" style="background:var(--f4)"></span>
      <span class="mode-hz" id="f4">--</span>
      <span class="mode-name">F4</span>
      <span class="conf" id="f4c"></span>
    </div>
  </div>

  <!-- ステータス行 -->
  <div class="status-row">
    <span>検出方式</span>
    <span class="badge ok" id="methodBadge">v2 輝度ピーク</span>
  </div>

  <!-- 平均値 -->
  <div class="averages">
    <div class="avg-card">
      <div class="avg-value" id="avg24h">--.-</div>
      <div class="avg-label">24時間平均 (F1)</div>
    </div>
    <div class="avg-card">
      <div class="avg-value" id="avg7d">--.-</div>
      <div class="avg-label">7日間平均 (F1)</div>
    </div>
  </div>

  <!-- 折れ線グラフ -->
  <div class="chart-section">
    <div class="chart-header">
      <span class="chart-title">過去72時間</span>
      <div class="chart-toggles">
        <button class="toggle-btn active" data-mode="F1" onclick="toggleMode('F1',this)">F1</button>
        <button class="toggle-btn" data-mode="F2" onclick="toggleMode('F2',this)">F2</button>
        <button class="toggle-btn" data-mode="F3" onclick="toggleMode('F3',this)">F3</button>
        <button class="toggle-btn" data-mode="F4" onclick="toggleMode('F4',this)">F4</button>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="chart"></canvas>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="chart-time-labels">
      <span id="t72h">-72h</span>
      <span id="t48h">-48h</span>
      <span id="t24h">-24h</span>
      <span>now</span>
    </div>
  </div>

  <!-- ソース状態 -->
  <div class="sources">
    <div class="source-item">
      <span class="source-name">Tomsk (sos70.ru)</span>
      <span class="badge" id="srcTomsk">—</span>
    </div>
    <div class="source-item">
      <span class="source-name">Cumiana (vlf.it)</span>
      <span class="badge" id="srcCumiana">—</span>
    </div>
  </div>

  <!-- フッター -->
  <div class="footer">
    <div class="mmm-bottom">⚡ MASTER MIND MEMBERS ⚡</div>
    <div class="time" id="lastUpdate">最新取得: --</div>
    <div class="version">Schumann Monitor v2 — luminosity peak detection</div>
  </div>

</div>

<script>
// ============================================================
// データ読み込みと表示
// ============================================================

const JSON_URL = 'schumann.json';
const HISTORY_URL = 'schumann_history.json';

// グラフ表示状態
let showModes = { F1: true, F2: false, F3: false, F4: false };
let historyData = [];

const COLORS = {
  F1: '#e8e8e8',
  F2: '#f0e060',
  F3: '#e85050',
  F4: '#50c878'
};

const HZ_RANGES = {
  F1: [6, 10],
  F2: [12, 16],
  F3: [18, 23],
  F4: [24, 29]
};

// === データ取得 ===

async function fetchJSON(url) {
  try {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch(e) {
    console.warn('Fetch failed:', url, e);
    return null;
  }
}

async function loadData() {
  const [current, history] = await Promise.all([
    fetchJSON(JSON_URL),
    fetchJSON(HISTORY_URL)
  ]);
  
  if (current) updateCurrent(current);
  if (history) {
    historyData = history;
    updateAverages(history);
    drawChart();
  }
}

// === 現在値の表示更新 ===

function updateCurrent(data) {
  const modes = data.modes || {};
  
  // メインHz
  const el = document.getElementById('mainHz');
  if (modes.F1 != null) {
    el.textContent = modes.F1.toFixed(2);
    el.classList.remove('loading');
  } else {
    el.textContent = '--.-';
  }
  
  // 4モード
  ['F1','F2','F3','F4'].forEach(m => {
    const hz = modes[m];
    document.getElementById(m.toLowerCase()).textContent = 
      hz != null ? hz.toFixed(1) : '--';
    
    // 信頼度表示
    const detail = data.details?.tomsk?.[m];
    const confEl = document.getElementById(m.toLowerCase() + 'c');
    if (detail && detail.confidence != null) {
      const pct = Math.round(detail.confidence * 100);
      confEl.textContent = pct + '%';
      confEl.style.color = pct > 60 ? 'var(--green)' : pct > 30 ? 'var(--warn)' : 'var(--err)';
    }
  });
  
  // 検出方式
  const method = data.method || 'unknown';
  document.getElementById('methodBadge').textContent = 
    method === 'luminosity_peak' ? 'v2 輝度ピーク' : method;
  
  // ソース状態
  const tomsk = data.details?.tomsk;
  const cumiana = data.details?.cumiana;
  
  const srcTomsk = document.getElementById('srcTomsk');
  if (tomsk && Object.keys(tomsk).some(k => tomsk[k] && tomsk[k].hz)) {
    srcTomsk.className = 'badge ok';
    srcTomsk.textContent = '● 稼働中';
  } else {
    srcTomsk.className = 'badge err';
    srcTomsk.textContent = '● 停止';
  }
  
  const srcCumiana = document.getElementById('srcCumiana');
  if (cumiana && cumiana.status === 'ok') {
    srcCumiana.className = 'badge ok';
    srcCumiana.textContent = '● Lv.' + (cumiana.activity_level || 0);
  } else {
    srcCumiana.className = 'badge warn';
    srcCumiana.textContent = '● 未取得';
  }
  
  // 最終更新時刻
  document.getElementById('lastUpdate').textContent = 
    '最新取得: ' + (data.timestamp_jst || '--');
}

// === 平均値計算 ===

function updateAverages(history) {
  if (!history || history.length === 0) return;
  
  const now = new Date();
  
  // 24時間平均
  const h24 = history.filter(h => {
    const t = new Date(h.timestamp);
    return (now - t) < 24 * 3600 * 1000 && h.F1 != null;
  });
  
  if (h24.length > 0) {
    const avg = h24.reduce((s, h) => s + h.F1, 0) / h24.length;
    document.getElementById('avg24h').textContent = avg.toFixed(2);
  }
  
  // 7日平均
  const h7d = history.filter(h => {
    const t = new Date(h.timestamp);
    return (now - t) < 7 * 24 * 3600 * 1000 && h.F1 != null;
  });
  
  if (h7d.length > 0) {
    const avg = h7d.reduce((s, h) => s + h.F1, 0) / h7d.length;
    document.getElementById('avg7d').textContent = avg.toFixed(2);
  }
}

// === 折れ線グラフ ===

function drawChart() {
  const canvas = document.getElementById('chart');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  canvas.style.height = '200px';
  
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  
  const W = rect.width;
  const H = 200;
  const PAD = { top: 8, right: 8, bottom: 4, left: 36 };
  const pw = W - PAD.left - PAD.right;
  const ph = H - PAD.top - PAD.bottom;
  
  // 背景
  ctx.fillStyle = 'transparent';
  ctx.clearRect(0, 0, W, H);
  
  // 72時間前〜今のタイムレンジ
  const now = Date.now();
  const t72h = now - 72 * 3600 * 1000;
  
  // 有効なモードを描画
  const activeModes = Object.keys(showModes).filter(m => showModes[m]);
  if (activeModes.length === 0 || historyData.length === 0) return;
  
  // Hz範囲を決定（表示モードに合わせる）
  let hzMin = Infinity, hzMax = -Infinity;
  activeModes.forEach(m => {
    const range = HZ_RANGES[m];
    hzMin = Math.min(hzMin, range[0]);
    hzMax = Math.max(hzMax, range[1]);
  });
  
  // グリッドライン
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  const hzStep = hzMax - hzMin > 10 ? 5 : 2;
  for (let hz = Math.ceil(hzMin); hz <= hzMax; hz += hzStep) {
    const y = PAD.top + ph - (hz - hzMin) / (hzMax - hzMin) * ph;
    ctx.beginPath();
    ctx.moveTo(PAD.left, y);
    ctx.lineTo(PAD.left + pw, y);
    ctx.stroke();
    
    // ラベル
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '9px JetBrains Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(hz + '', PAD.left - 4, y + 3);
  }
  
  // 基準線 7.83Hz（F1表示時のみ）
  if (showModes.F1 && hzMin < 7.83 && hzMax > 7.83) {
    const y783 = PAD.top + ph - (7.83 - hzMin) / (hzMax - hzMin) * ph;
    ctx.strokeStyle = 'rgba(74,158,237,0.2)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(PAD.left, y783);
    ctx.lineTo(PAD.left + pw, y783);
    ctx.stroke();
    ctx.setLineDash([]);
    
    ctx.fillStyle = 'rgba(74,158,237,0.3)';
    ctx.font = '8px JetBrains Mono, monospace';
    ctx.textAlign = 'left';
    ctx.fillText('7.83', PAD.left + 2, y783 - 3);
  }
  
  // 8.02Hz目標線（F1表示時のみ）
  if (showModes.F1 && hzMin < 8.02 && hzMax > 8.02) {
    const y802 = PAD.top + ph - (8.02 - hzMin) / (hzMax - hzMin) * ph;
    ctx.strokeStyle = 'rgba(196,162,101,0.25)';
    ctx.setLineDash([2, 3]);
    ctx.beginPath();
    ctx.moveTo(PAD.left, y802);
    ctx.lineTo(PAD.left + pw, y802);
    ctx.stroke();
    ctx.setLineDash([]);
    
    ctx.fillStyle = 'rgba(196,162,101,0.4)';
    ctx.font = '8px JetBrains Mono, monospace';
    ctx.textAlign = 'left';
    ctx.fillText('8.02 ✦', PAD.left + 2, y802 - 3);
  }
  
  // データプロット
  activeModes.forEach(mode => {
    const points = historyData
      .filter(h => h[mode] != null)
      .map(h => ({
        t: new Date(h.timestamp).getTime(),
        v: h[mode]
      }))
      .filter(p => p.t >= t72h && p.t <= now)
      .sort((a, b) => a.t - b.t);
    
    if (points.length < 2) return;
    
    ctx.strokeStyle = COLORS[mode];
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    
    points.forEach((p, i) => {
      const x = PAD.left + (p.t - t72h) / (now - t72h) * pw;
      const y = PAD.top + ph - (p.v - hzMin) / (hzMax - hzMin) * ph;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    
    ctx.stroke();
    
    // 最新点にドット
    const last = points[points.length - 1];
    const lx = PAD.left + (last.t - t72h) / (now - t72h) * pw;
    const ly = PAD.top + ph - (last.v - hzMin) / (hzMax - hzMin) * ph;
    ctx.fillStyle = COLORS[mode];
    ctx.beginPath();
    ctx.arc(lx, ly, 3, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // 時間軸ラベル更新
  const fmt = d => {
    const dt = new Date(d);
    return (dt.getMonth()+1) + '/' + dt.getDate() + ' ' + 
           String(dt.getHours()).padStart(2,'0') + ':00';
  };
  document.getElementById('t72h').textContent = fmt(t72h);
  document.getElementById('t48h').textContent = fmt(now - 48*3600*1000);
  document.getElementById('t24h').textContent = fmt(now - 24*3600*1000);
}

// === トグルボタン ===

function toggleMode(mode, btn) {
  showModes[mode] = !showModes[mode];
  btn.classList.toggle('active');
  drawChart();
}

// === ツールチップ（タッチ/マウス） ===

(function() {
  const canvas = document.getElementById('chart');
  const tooltip = document.getElementById('tooltip');
  
  function showTip(clientX) {
    if (historyData.length === 0) return;
    
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const PAD_LEFT = 36;
    const pw = rect.width - PAD_LEFT - 8;
    
    if (x < PAD_LEFT || x > PAD_LEFT + pw) {
      tooltip.style.display = 'none';
      return;
    }
    
    const ratio = (x - PAD_LEFT) / pw;
    const now = Date.now();
    const t72h = now - 72 * 3600 * 1000;
    const targetT = t72h + ratio * (now - t72h);
    
    // 最も近いデータポイントを探す
    let closest = null, minDist = Infinity;
    historyData.forEach(h => {
      const t = new Date(h.timestamp).getTime();
      const d = Math.abs(t - targetT);
      if (d < minDist) { minDist = d; closest = h; }
    });
    
    if (!closest || minDist > 15 * 60 * 1000) {
      tooltip.style.display = 'none';
      return;
    }
    
    const dt = new Date(closest.timestamp);
    const timeStr = (dt.getMonth()+1) + '/' + dt.getDate() + ' ' +
                    String(dt.getHours()).padStart(2,'0') + ':' +
                    String(dt.getMinutes()).padStart(2,'0');
    
    let lines = [timeStr];
    ['F1','F2','F3','F4'].forEach(m => {
      if (showModes[m] && closest[m] != null) {
        lines.push(m + ': ' + closest[m].toFixed(2) + ' Hz');
      }
    });
    
    tooltip.innerHTML = lines.join('<br>');
    tooltip.style.display = 'block';
    tooltip.style.left = Math.min(x, rect.width - 120) + 'px';
    tooltip.style.top = '8px';
  }
  
  canvas.addEventListener('mousemove', e => showTip(e.clientX));
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    showTip(e.touches[0].clientX);
  });
  canvas.addEventListener('mouseleave', () => tooltip.style.display = 'none');
  canvas.addEventListener('touchend', () => tooltip.style.display = 'none');
})();

// === 初期化 & 自動更新 ===

loadData();
setInterval(loadData, 5 * 60 * 1000); // 5分ごとに自動更新
window.addEventListener('resize', drawChart);
</script>
