<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
<title>月画像 30枚 NASA SVS 版</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(110, 196, 245, 0.08), transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(201, 169, 97, 0.06), transparent 60%),
      linear-gradient(180deg, #050a1c 0%, #02050f 100%);
    color: #fff;
    font-family: 'Shippori Mincho', 'Yu Mincho', serif;
    padding: 20px 12px 40px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    color: rgba(245, 235, 216, 0.95);
    letter-spacing: 0.3em;
    font-size: 1.4rem;
    margin: 8px 0 6px;
  }
  .sub {
    text-align: center;
    color: rgba(201, 169, 97, 0.85);
    letter-spacing: 0.18em;
    font-size: 0.78rem;
    margin-bottom: 24px;
    line-height: 1.8;
  }
  .nav {
    text-align: center;
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .nav a {
    display: inline-block;
    padding: 8px 16px;
    background: rgba(20, 30, 55, 0.6);
    border: 1px solid rgba(201, 169, 97, 0.4);
    border-radius: 20px;
    color: rgba(201, 169, 97, 0.95);
    text-decoration: none;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
  }
  .nav a.is-active {
    background: linear-gradient(180deg, rgba(245,196,74,0.35), rgba(201,169,97,0.15));
    border-color: rgba(245, 196, 74, 0.7);
    color: #fff;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 14px;
    max-width: 1300px;
    margin: 0 auto;
  }
  .cell {
    background: rgba(20, 30, 55, 0.45);
    border: 1px solid rgba(201, 169, 97, 0.28);
    border-radius: 12px;
    padding: 12px 8px 10px;
    text-align: center;
  }
  .cell.seiten {
    background: linear-gradient(180deg, rgba(60, 50, 30, 0.55), rgba(20, 30, 55, 0.55));
    border-color: rgba(245, 196, 74, 0.7);
    box-shadow: 0 0 16px rgba(245, 196, 74, 0.18);
  }
  .cell .img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
  }
  /* 月の輪郭 (新月でも月の場所が分かる) */
  .cell .img-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(245, 235, 216, 0.22);
    box-shadow:
      inset 0 0 16px rgba(245, 235, 216, 0.06),
      0 0 12px rgba(245, 235, 216, 0.10);
    pointer-events: none;
  }
  .cell img {
    width: 100%;
    height: auto;
    max-height: 100%;
    object-fit: contain;
    /* 月を暖色に + グロー */
    filter:
      sepia(0.55)
      saturate(1.35)
      brightness(1.05)
      drop-shadow(0 0 12px rgba(245, 200, 100, 0.35));
  }
  .cell .num {
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    color: rgba(255, 255, 255, 0.95);
    margin-bottom: 2px;
  }
  .cell .age {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: rgba(110, 196, 245, 0.85);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .cell .name {
    font-size: 0.74rem;
    color: rgba(201, 169, 97, 0.95);
    letter-spacing: 0.1em;
  }
  .cell.seiten .name {
    color: rgba(245, 196, 74, 1);
  }
</style>
</head>
<body>
  <h1>N A S A  S V S  版</h1>
  <div class="sub">
    NASA Goddard CI Lab の 2024 年月相データ<br>
    実際の月の正確な照明シミュレーション
  </div>
  <div class="nav">
    <a href="./moon_lineup.html">① 既存 (ChatGPT版)</a>
    <a href="./moon_lineup_nasa.html" class="is-active">② NASA SVS 版</a>
    <a href="./moon_lineup_svg.html">③ SVG 動的影版</a>
    <a href="./tsukiyoga_v7.html">← v7 に戻る</a>
  </div>

  <div class="grid" id="grid"></div>

<script>
  const moons = [
    { n:'01', age:0,  name:'新 月',     seiten:true },
    { n:'02', age:1,  name:'フ ツ カ ヅ キ' },
    { n:'03', age:2,  name:'ミ カ ヅ キ' },
    { n:'04', age:3,  name:'マ ユ ヅ キ' },
    { n:'05', age:4,  name:'ユ ウ ヅ キ' },
    { n:'06', age:5,  name:'ム イ カ ヅ キ' },
    { n:'07', age:6,  name:'ヨ イ ヅ キ' },
    { n:'08', age:7,  name:'上 弦',     seiten:true },
    { n:'09', age:8,  name:'ヤ ウ カ ヅ キ' },
    { n:'10', age:9,  name:'コ コ ノ カ ヅ キ' },
    { n:'11', age:10, name:'ト オ カ ン ヤ' },
    { n:'12', age:11, name:'ジ ュ ウ イ チ ヤ' },
    { n:'13', age:12, name:'ジ ュ ウ ニ ヤ' },
    { n:'14', age:13, name:'ア タ ラ ヨ' },
    { n:'15', age:14, name:'マ チ ヨ イ' },
    { n:'16', age:15, name:'満 月',     seiten:true },
    { n:'17', age:16, name:'イ ザ ヨ イ' },
    { n:'18', age:17, name:'タ チ マ チ' },
    { n:'19', age:18, name:'イ マ チ' },
    { n:'20', age:19, name:'ネ マ チ' },
    { n:'21', age:20, name:'フ ケ マ チ' },
    { n:'22', age:21, name:'ニ ジ ュ ウ イ チ ヤ' },
    { n:'23', age:22, name:'下 弦',     seiten:true },
    { n:'24', age:23, name:'ニ ジ ュ ウ ヨ ヤ' },
    { n:'25', age:24, name:'ホ シ ア ヒ' },
    { n:'26', age:25, name:'ナ ゴ リ ヅ キ' },
    { n:'27', age:26, name:'ア カ ツ キ' },
    { n:'28', age:27, name:'ア ケ ボ ノ' },
    { n:'29', age:28, name:'ツ ゴ モ リ' },
    { n:'30', age:29, name:'ミ ソ カ' }
  ];
  document.getElementById('grid').innerHTML = moons.map(m => `
    <div class="cell${m.seiten ? ' seiten' : ''}">
      <div class="img-wrap">
        <img src="./moon_nasa/moon_${m.n}.jpg" alt="月齢${m.age}">
      </div>
      <div class="num">moon_${m.n}</div>
      <div class="age">月齢 ${m.age}</div>
      <div class="name">${m.seiten ? '★ ' : ''}${m.name}</div>
    </div>
  `).join('');
</script>
</body>
</html>
