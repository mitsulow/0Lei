name: Schumann Resonance v6 (Pixel Extraction)

on:
  schedule:
    # 15分ごと。0/15/30/45分ちょうどは GitHub の cron が混雑して
    # 数時間スキップされることがあるため、空いている分にずらす
    - cron: "3,18,33,48 * * * *"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pillow numpy
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: Fetch and analyze (deterministic pixel extraction)
        run: python fetch_schumann_v6.py

      - name: Generate self-made graphs (rolling 3-day window)
        run: python make_graphs.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schumann_data.json schumann_history.json schumann_series.json latest_spectrogram.jpg latest_linegraph.jpg graph_f1.png graph_f2.png graph_f3.png graph_f4.png || true
          git diff --staged --quiet || git commit -m "Update Schumann data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
