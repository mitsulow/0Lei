name: Fetch tide data (JMA)

on:
  schedule:
    # 毎月1日 JST 00:30 = UTC前日 15:30
    - cron: '30 15 1 * *'
  workflow_dispatch:  # 手動実行可能

permissions:
  contents: write  # git push するのに必要

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch JMA tide data
        run: python scripts/fetch_tide.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tide/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(tide): update JMA tide data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
