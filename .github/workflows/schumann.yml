name: Schumann Resonance Monitor v2

on:
  schedule:
    # 5分ごとに実行
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # 手動実行も可能

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install Pillow numpy
      
      - name: Fetch Schumann data
        run: python fetch_schumann.py
      
      - name: Commit and push
        run: |
          git config user.name "Schumann Bot"
          git config user.email "bot@schumann.earth"
          git add schumann.json schumann_history.json
          git diff --staged --quiet || git commit -m "🌍 Update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
