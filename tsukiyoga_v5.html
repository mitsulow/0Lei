<!DOCTYPE html>
<html lang="ja">

<title>ツキヨガ · 月はいまどこに</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Cinzel:wght@400;600&family=Shippori+Mincho:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  // SunCalc インライン実装
  (function() {
    const rad = Math.PI / 180;
    const dayMs = 86400000;
    const J1970 = 2440588;
    const J2000 = 2451545;
    const e = rad * 23.4397;

    function toJulian(d) { return d.valueOf() / dayMs - 0.5 + J1970; }
    function toDays(d) { return toJulian(d) - J2000; }
    function rightAscension(l, b) { return Math.atan2(Math.sin(l)*Math.cos(e) - Math.tan(b)*Math.sin(e), Math.cos(l)); }
    function declination(l, b) { return Math.asin(Math.sin(b)*Math.cos(e) + Math.cos(b)*Math.sin(e)*Math.sin(l)); }
    function azimuthF(H, phi, dec) { return Math.atan2(Math.sin(H), Math.cos(H)*Math.sin(phi) - Math.tan(dec)*Math.cos(phi)); }
    function altitudeF(H, phi, dec) { return Math.asin(Math.sin(phi)*Math.sin(dec) + Math.cos(phi)*Math.cos(dec)*Math.cos(H)); }
    function siderealTime(d, lw) { return rad * (280.16 + 360.9856235 * d) - lw; }
    function solarMeanAnomaly(d) { return rad * (357.5291 + 0.98560028 * d); }
    function eclipticLongitude(M) {
      const C = rad * (1.9148*Math.sin(M) + 0.02*Math.sin(2*M) + 0.0003*Math.sin(3*M));
      return M + C + rad * 102.9372 + Math.PI;
    }
    function sunCoords(d) {
      const M = solarMeanAnomaly(d);
      const L = eclipticLongitude(M);
      return { dec: declination(L, 0), ra: rightAscension(L, 0) };
    }
    function moonCoords(d) {
      const L = rad * (218.316 + 13.176396 * d);
      const M = rad * (134.963 + 13.064993 * d);
      const F = rad * (93.272 + 13.229350 * d);
      const l = L + rad * 6.289 * Math.sin(M);
      const b = rad * 5.128 * Math.sin(F);
      const dt = 385001 - 20905 * Math.cos(M);
      return { ra: rightAscension(l, b), dec: declination(l, b), dist: dt };
    }

    window.SunCalc = {
      getMoonPosition: function(date, lat, lng) {
        const lw = rad * -lng;
        const phi = rad * lat;
        const d = toDays(date);
        const c = moonCoords(d);
        const H = siderealTime(d, lw) - c.ra;
        let h = altitudeF(H, phi, c.dec);
        h = h + rad * 0.017 / Math.tan(h + rad * 10.26 / (h + rad * 5.10));
        return { azimuth: azimuthF(H, phi, c.dec), altitude: h, distance: c.dist };
      },
      getPosition: function(date, lat, lng) {
        const lw = rad * -lng;
        const phi = rad * lat;
        const d = toDays(date);
        const c = sunCoords(d);
        const H = siderealTime(d, lw) - c.ra;
        return { azimuth: azimuthF(H, phi, c.dec), altitude: altitudeF(H, phi, c.dec) };
      },
      // 月の月齢・照らされ具合
      getMoonIllumination: function(date) {
        const d = toDays(date);
        const s = sunCoords(d);
        const m = moonCoords(d);
        const sdist = 149598000;
        const phi = Math.acos(Math.sin(s.dec)*Math.sin(m.dec) + Math.cos(s.dec)*Math.cos(m.dec)*Math.cos(s.ra - m.ra));
        const inc = Math.atan2(sdist*Math.sin(phi), m.dist - sdist*Math.cos(phi));
        const angle = Math.atan2(Math.cos(s.dec)*Math.sin(s.ra - m.ra),
          Math.sin(s.dec)*Math.cos(m.dec) - Math.cos(s.dec)*Math.sin(m.dec)*Math.cos(s.ra - m.ra));
        return {
          fraction: (1 + Math.cos(inc)) / 2,
          phase: 0.5 + 0.5 * inc * (angle < 0 ? -1 : 1) / Math.PI,
          angle: angle
        };
      },
      // 太陽位置（方位・高度）から太陽の空間方向ベクトルを得るのに使う
      getSunEquatorial: function(date) {
        const d = toDays(date);
        return sunCoords(d);
      },
      getMoonEquatorial: function(date) {
        const d = toDays(date);
        return moonCoords(d);
      }
    };
  })();
</script>

  const BASE_NEW_MOON = new Date('2000-01-06T18:14:00Z').getTime();

  function getMoonAge(date) {
    const diff = (date.getTime() - BASE_NEW_MOON) / 86400000;
    const age = diff % SYNODIC_MONTH;
    return age < 0 ? age + SYNODIC_MONTH : age;
  }

  function getPhaseName(age) {
    if (age < 1.0) return { jp: 'つきたち', en: 'new moon', key: 'tsukitachi' };
    if (age < 6.38) return { jp: '三日月', en: 'waxing crescent', key: null };
    if (age < 8.38) return { jp: 'かたみに', en: 'first quarter', key: 'katamini' };
    if (age < 13.77) return { jp: '十日夜', en: 'waxing gibbous', key: null };
    if (age < 15.77) return { jp: 'くまなし', en: 'full moon', key: 'kumanashi' };
    if (age < 21.15) return { jp: '居待月', en: 'waning gibbous', key: null };
    if (age < 23.15) return { jp: 'ありあけ', en: 'last quarter', key: 'ariake' };
    if (age < 28.53) return { jp: '有明月', en: 'waning crescent', key: null };
    return { jp: 'つきたち', en: 'new moon', key: 'tsukitachi' };
  }

  function applyMoonShadow(el, phase) {
    if (phase < 0.5) {
      el.style.transform = `translateX(${-phase*2*100}%) scaleX(${Math.cos(phase*Math.PI)})`;
      el.style.transformOrigin = 'right center';
    } else {
      el.style.transform = `translateX(${(phase-0.5)*2*100}%) scaleX(${Math.abs(Math.cos(phase*Math.PI))})`;
      el.style.transformOrigin = 'left center';
    }
  }

      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
      positions[i*3+1] = r * Math.cos(phi);
      positions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
      color: 0xa0c8f0, size: 0.08, transparent: true, opacity: 0.6,
      sizeAttenuation: true, blending: THREE.AdditiveBlending

  function fibSphere(n, r) {
    const pts = [];
    const g = Math.PI * (3 - Math.sqrt(5));
    for (let i = 0; i < n; i++) {
      const y = 1 - (i / (n - 1)) * 2;
      const rad = Math.sqrt(1 - y * y);
      const t = g * i;
      pts.push(new THREE.Vector3(
        Math.cos(t) * rad * r,
        y * r,
        Math.sin(t) * rad * r
      ));
    }
    return pts;
  }

  const GRID_POINTS = fibSphere(80, IONO_R);

  function buildTris() {
    const tris = [];
    const used = new Set();
    for (let i = 0; i < GRID_POINTS.length; i++) {
      const d = [];
      for (let j = 0; j < GRID_POINTS.length; j++) {
        if (j !== i) d.push({ j, dist: GRID_POINTS[i].distanceToSquared(GRID_POINTS[j]) });
      }
      d.sort((a, b) => a.dist - b.dist);
      for (let a = 0; a < Math.min(3, d.length); a++) {
        for (let b = a + 1; b < Math.min(4, d.length); b++) {
          const key = [i, d[a].j, d[b].j].sort().join('-');
          if (!used.has(key)) {
            used.add(key);
            tris.push([i, d[a].j, d[b].j]);
          }
        }
      }
    }
    return tris;
  }

        permEdgeSet.add(key);
        const p1 = GRID_POINTS[a], p2 = GRID_POINTS[b];

    const lineGeo = new THREE.BufferGeometry();

  }

    for (let i = activeResonances.length - 1; i >= 0; i--) {

      const t = (now - r.startTime) / r.duration;
      if (t >= 1) {
        ionoGroup.remove(r.lines);
        ionoGroup.remove(r.face);
        r.lines.geometry.dispose();
        r.lines.material.dispose();
        r.face.geometry.dispose();
        r.face.material.dispose();
        activeResonances.splice(i, 1);
        continue;
      }
      let op;
      if (t < 0.25) op = t / 0.25;
      else if (t < 0.6) op = 1;
      else op = 1 - (t - 0.6) / 0.4;
      r.lines.material.opacity = op * 0.8;

  // 地球中心から見た天球座標（赤道座標系）
  //   Y軸: 地球の北極
  //   X軸: 春分点方向
  //   XZ平面: 赤道面
  function equatorialToVec3(ra, dec, dist) {
    return new THREE.Vector3(
      dist * Math.cos(dec) * Math.cos(ra),
      dist * Math.sin(dec),
      dist * Math.cos(dec) * Math.sin(ra)
    );
  }

  // グリニッジ恒星時（地球の自転角）
  function getGMST(date) {
    const jd = date.valueOf() / 86400000 + 2440587.5;
    const t = (jd - 2451545.0) / 36525;
    let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0)
             + 0.000387933 * t * t - t * t * t / 38710000;
    gmst = ((gmst % 360) + 360) % 360;
    return gmst * Math.PI / 180;
  }

  // ======== タッチ/マウス操作 ========
  let isDragging = false;
  let dragStart = { x: 0, y: 0 };
  let rotStart = { x: 0, y: 0 };
  let lastPinch = 0;

  function onPointerDown(e) {
    if (e.touches && e.touches.length === 2) {
      // ピンチ開始
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastPinch = Math.sqrt(dx * dx + dy * dy);
      isDragging = false;
      return;
    }
    const touch = e.touches ? e.touches[0] : e;
    isDragging = true;
    dragStart.x = touch.clientX;
    dragStart.y = touch.clientY;
    rotStart.x = state.userRotX;
    rotStart.y = state.userRotY;
    if (state.hintShown) {
      state.hintShown = false;
      document.getElementById('rotHint').classList.add('hidden');
    }
  }

  function onPointerMove(e) {
    if (e.touches && e.touches.length === 2) {
      // ピンチズーム
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (lastPinch > 0) {
        state.targetZoom += (lastPinch - dist) * 0.02;
        state.targetZoom = Math.max(2.2, Math.min(14, state.targetZoom));
      }
      lastPinch = dist;
      e.preventDefault();
      return;
    }
    if (!isDragging) return;
    const touch = e.touches ? e.touches[0] : e;
    const dx = touch.clientX - dragStart.x;
    const dy = touch.clientY - dragStart.y;
    state.userRotY = rotStart.y + dx * 0.008;
    state.userRotX = Math.max(-1.3, Math.min(1.3, rotStart.x + dy * 0.008));
    e.preventDefault();
  }

  function onPointerUp(e) {
    isDragging = false;
    if (e.touches && e.touches.length === 0) lastPinch = 0;
  }

  function onWheel(e) {
    state.targetZoom += e.deltaY * 0.004;
    state.targetZoom = Math.max(2.2, Math.min(14, state.targetZoom));
    e.preventDefault();
  }

  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp);
  canvas.addEventListener('wheel', onWheel, { passive: false });

  // ブラウザのピンチジェスチャー無効化
  document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
  document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
  document.addEventListener('gestureend', e => e.preventDefault(), { passive: false });

  // ======== 方位言語 ========
  function azimuthToJp(az) {
    let deg = (az * 180 / Math.PI + 180) % 360;
    if (deg < 0) deg += 360;
    const dirs = [
      {name:'北', en:'N', deg:0},{name:'北北東', en:'NNE', deg:22.5},
      {name:'北東', en:'NE', deg:45},{name:'東北東', en:'ENE', deg:67.5},
      {name:'東', en:'E', deg:90},{name:'東南東', en:'ESE', deg:112.5},
      {name:'南東', en:'SE', deg:135},{name:'南南東', en:'SSE', deg:157.5},
      {name:'南', en:'S', deg:180},{name:'南南西', en:'SSW', deg:202.5},
      {name:'南西', en:'SW', deg:225},{name:'西南西', en:'WSW', deg:247.5},
      {name:'西', en:'W', deg:270},{name:'西北西', en:'WNW', deg:292.5},
      {name:'北西', en:'NW', deg:315},{name:'北北西', en:'NNW', deg:337.5}
    ];
    let best = dirs[0], md = 360;
    for (const d of dirs) {
      let diff = Math.abs(deg - d.deg);
      if (diff > 180) diff = 360 - diff;
      if (diff < md) { md = diff; best = d; }
    }
    return { name: best.name, en: best.en, deg };
  }

  function altHeightJp(altDeg) {
    if (altDeg > 75) return { w: 'ほぼ真上', en: 'near zenith' };
    if (altDeg > 50) return { w: '空高く', en: 'high in sky' };
    if (altDeg > 25) return { w: '空の中腹', en: 'mid sky' };
    if (altDeg > 5) return { w: '低い位置', en: 'low in sky' };
    if (altDeg > -5) return { w: '地平線', en: 'at horizon' };
    if (altDeg > -30) return { w: '地平線の下', en: 'below horizon' };
    if (altDeg > -60) return { w: '地球の裏側', en: 'other side of earth' };
    return { w: 'ほぼ真下', en: 'near nadir' };
  }

  // ======== 更新 ========
  function updateData() {
    const now = new Date();
    const age = getMoonAge(now);
    const phase = getPhaseName(age);

    // 地球の自転（GMST）
    // 地球本体（earthStatic）を時刻に応じた角度に回す
    // これで那覇が宇宙空間のどこに位置するかが正しくなる
    earthStatic.rotation.y = getGMST(now);

    // 月の位置：地球中心から見た絶対方向（赤道座標→デカルト）
    const moonEq = SunCalc.getMoonEquatorial(now);
    const moonDist = 3.2;
    const moonWorldPos = equatorialToVec3(moonEq.ra, moonEq.dec, moonDist);
    moonGroup.position.copy(moonWorldPos);

    // 太陽の位置：同じく絶対方向
    const sunEq = SunCalc.getSunEquatorial(now);
    const sunDist = 7;
    const sunWorldPos = equatorialToVec3(sunEq.ra, sunEq.dec, sunDist);
    sunGroup.position.copy(sunWorldPos);

    // 太陽光は太陽位置から地球中心へ
    sunLight.position.copy(sunWorldPos);
    sunLight.target.position.set(0, 0, 0);
    sunLight.target.updateMatrixWorld();

    // 那覇から見た月の方位・高度（テキスト表示用）
    const moonPos = SunCalc.getMoonPosition(now, NAHA.lat, NAHA.lon);
    const altDeg = moonPos.altitude * 180 / Math.PI;

    const az = azimuthToJp(moonPos.azimuth);
    const h = altHeightJp(altDeg);

    let whereText;
    if (altDeg < -5) {
      whereText = `地 球 の 裏 側`;
    } else if (altDeg < 5) {
      whereText = `${az.name}の 地 平 線`;
    } else {
      whereText = `${az.name}の 空`;
    }

    document.getElementById('moonWhere').textContent = whereText;
    document.getElementById('moonWhereSub').textContent =
      `${h.en} · ${az.en} ${az.deg.toFixed(0)}° · alt ${altDeg.toFixed(0)}°`;

    document.getElementById('infoAge').textContent = age.toFixed(1);
    document.getElementById('infoPhase').textContent = phase.jp;
    document.getElementById('infoAlt').textContent = altDeg.toFixed(0) + '°';
  }

  // ======== タブ切替 ========
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const view = btn.dataset.view;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // すべてのビューをリセット
      document.getElementById('moonnavView').classList.remove('active');
      document.getElementById('calendarView').classList.remove('active');

      if (view === 'calendar') {
        document.getElementById('calendarView').classList.add('active');
        updateCalendarView();
      } else if (view === 'moonnav') {
        document.getElementById('moonnavView').classList.add('active');
        activateMoonNav();
      } else {
        deactivateMoonNav();
      }
    });
  });

  // ======== 月ナビ ========
  const navState = {
    heading: 0,      // スマホの方位（度、北=0、時計回り）
    pitch: 0,        // スマホの仰角（度、水平=0、上=+90、下=-90）
    permitted: false,
    moonAzDeg: 0,
    moonAltDeg: 0,
    animId: null
  };

  // 背景に星を散らす
  (function initNavStars() {
    const container = document.getElementById('moonnavStars');
    const count = 80;
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'moonnav-star';
      const size = Math.random() * 1.8 + 0.5;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.opacity = 0.2 + Math.random() * 0.5;
      container.appendChild(s);
    }
  })();

  function handleNavOrientation(e) {
    // コンパス方位（スマホの前方がどの方角を向いているか）
    let heading = null;
    if (typeof e.webkitCompassHeading === 'number') {
      heading = e.webkitCompassHeading; // iOS: 0=北、時計回り
    } else if (e.absolute && typeof e.alpha === 'number') {
      heading = (360 - e.alpha) % 360; // Android
    } else if (typeof e.alpha === 'number') {
      heading = (360 - e.alpha) % 360;
    }
    if (heading !== null) navState.heading = heading;

    // 仰角（スマホの画面が指す方向の上下）
    // beta = 90 で スマホを縦に立てた姿勢 → 背面カメラが地平線方向 → pitch = 0
    // beta = 0  で スマホを寝かせ画面が上を向く → 背面カメラが足元 → pitch = -90
    // beta = 180 で スマホ上下逆さで画面が下向き → 背面カメラが天頂 → pitch = 90
    if (typeof e.beta === 'number') {
      // ユーザーが月を探す自然な姿勢：スマホを立てて、上下に傾ける
      // 標準姿勢(beta=90) で地平線、beta減少で下、beta増加で上
      // pitch = beta - 90
      let pitch = e.beta - 90;
      if (pitch > 90) pitch = 90;
      if (pitch < -90) pitch = -90;
      navState.pitch = pitch;
    }
  }

  async function requestNavPermission() {
    // iOS 13+ では requestPermission() が必要
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const permission = await DeviceOrientationEvent.requestPermission();
        if (permission !== 'granted') {
          alert('センサーへのアクセスが許可されませんでした');
          return false;
        }
      } catch (err) {
        alert('エラー: ' + err.message);
        return false;
      }
    }

    navState.permitted = true;
    window.addEventListener('deviceorientationabsolute', handleNavOrientation);
    window.addEventListener('deviceorientation', handleNavOrientation);
    document.getElementById('navPermission').style.display = 'none';
    document.getElementById('navCalibrate').classList.add('visible');
    return true;
  }

  document.getElementById('navPermissionBtn').addEventListener('click', requestNavPermission);

  document.getElementById('navCalibrate').addEventListener('click', () => {
    alert('スマホを空中で「8の字」を描くように数回振ってください。これで方位センサーの精度が上がります。');
  });

  function renderMoonNav() {
    if (!navState.permitted) return;

    // 月の位置（那覇から見た、いま）
    const now = new Date();
    const moonPos = SunCalc.getMoonPosition(now, NAHA.lat, NAHA.lon);
    // SunCalcの方位：0=南, +π/2=西, -π/2=東, ±π=北
    // 北基準・時計回り（0=北、90=東、180=南、270=西）に変換
    let moonAz = (moonPos.azimuth * 180 / Math.PI + 180) % 360;
    if (moonAz < 0) moonAz += 360;
    const moonAlt = moonPos.altitude * 180 / Math.PI;

    navState.moonAzDeg = moonAz;
    navState.moonAltDeg = moonAlt;

    // スマホの向きとの差分
    let azDiff = moonAz - navState.heading;
    while (azDiff > 180) azDiff -= 360;
    while (azDiff < -180) azDiff += 360;

    const altDiff = moonAlt - navState.pitch;

    // 画面のFOV（視野角）
    const hFov = 60;
    const vFov = 75;

    // 画面座標への変換（-1 to 1 の正規化座標）
    const normX = azDiff / (hFov / 2);
    const normY = -altDiff / (vFov / 2);  // Y軸は画面下が正

    const w = window.innerWidth;
    const h = window.innerHeight - 62;  // タブバー除く

    const cx = w / 2;
    const cy = h / 2;

    const target = document.getElementById('navTarget');
    const arrow = document.getElementById('navArrow');
    const headline = document.getElementById('navHeadline');
    const sub = document.getElementById('navSub');

    const inBounds = Math.abs(normX) < 1 && Math.abs(normY) < 1;

    // 月が画面内か外か
    if (inBounds) {
      // 画面内
      target.style.display = 'flex';
      arrow.classList.remove('visible');

      const screenX = cx + normX * cx;
      const screenY = cy + normY * cy;
      target.style.left = screenX + 'px';
      target.style.top = screenY + 'px';

      // 中心に近いほど「ロック」
      const dist = Math.sqrt(normX * normX + normY * normY);
      if (dist < 0.15) {
        target.classList.add('locked');
        headline.classList.add('locked');
        headline.textContent = '月 · 見 つ け た';
        sub.textContent = 'そ の ま ま 月 を 感 じ て';
      } else if (dist < 0.4) {
        target.classList.remove('locked');
        headline.classList.remove('locked');
        headline.textContent = 'そ こ · 近 い';
        sub.textContent = 'も う 少 し · そ の ま ま';
      } else {
        target.classList.remove('locked');
        headline.classList.remove('locked');
        headline.textContent = 'そ の 方 向';
        sub.textContent = 'そ の ま ま 月 へ';
      }

      // 月の満ち欠け
      const age = getMoonAge(now);
      applyMoonShadow(document.getElementById('navMoonShadow'), age / SYNODIC_MONTH);
    } else {
      // 画面外 → 矢印表示
      target.style.display = 'none';
      arrow.classList.add('visible');

      // 矢印を画面端の月方向に配置
      const r = Math.sqrt(normX * normX + normY * normY);
      const unitX = normX / r;
      const unitY = normY / r;

      // 画面端より少し内側（余白考慮）
      const edgeMarginX = 50;
      const edgeMarginY = 130; // 上側は指示テキスト分、下側はステータス分
      const maxRadiusX = (w / 2) - edgeMarginX;
      const maxRadiusY = (h / 2) - edgeMarginY;

      // ベクトルの角度から端との交点を計算
      const scaleX = maxRadiusX / Math.abs(unitX || 0.001);
      const scaleY = maxRadiusY / Math.abs(unitY || 0.001);
      const scale = Math.min(scaleX, scaleY);

      const arrowX = cx + unitX * scale;
      const arrowY = cy + unitY * scale;
      arrow.style.left = arrowX + 'px';
      arrow.style.top = arrowY + 'px';

      // 矢印の回転：SVG内で矢印は上向き。画面上の月方向に回転
      const rotRad = Math.atan2(normY, normX) + Math.PI / 2;
      arrow.style.transform = `rotate(${rotRad}rad)`;

      headline.classList.remove('locked');

      // 「もっと○○へ」の言語指示
      const absAz = Math.abs(azDiff);
      const absAlt = Math.abs(altDiff);

      if (moonAlt < -5) {
        headline.textContent = '月 は 地 球 の 裏 側';
        sub.textContent = '足 元 の 方 向 に 月 が あ り ま す';
      } else if (absAlt > absAz && altDiff > 0) {
        headline.textContent = 'も っ と 上 へ';
        sub.textContent = `高 く 見 上 げ て · ${Math.abs(altDiff).toFixed(0)}°`;
      } else if (absAlt > absAz && altDiff < 0) {
        headline.textContent = 'も っ と 下 へ';
        sub.textContent = `足 元 に 近 く · ${Math.abs(altDiff).toFixed(0)}°`;
      } else if (azDiff > 0) {
        headline.textContent = 'も っ と 右 へ';
        sub.textContent = `右 に · ${Math.abs(azDiff).toFixed(0)}°`;
      } else {
        headline.textContent = 'も っ と 左 へ';
        sub.textContent = `左 に · ${Math.abs(azDiff).toFixed(0)}°`;
      }
    }

    // ステータス表示
    const azJp = azimuthToJp(moonPos.azimuth);
    document.getElementById('navStatusValue').textContent =
      `${azJp.en} ${azJp.deg.toFixed(0)}° · alt ${moonAlt.toFixed(0)}°`;
  }

  function activateMoonNav() {
    // 許可がまだなら、ボタンを出すだけ
    if (!navState.permitted) {
      document.getElementById('navPermission').style.display = 'block';
      return;
    }
    // 描画ループ開始
    if (navState.animId) cancelAnimationFrame(navState.animId);
    function loop() {
      renderMoonNav();
      navState.animId = requestAnimationFrame(loop);
    }
    loop();
  }

  function deactivateMoonNav() {
    if (navState.animId) {
      cancelAnimationFrame(navState.animId);
      navState.animId = null;
    }
  }

  // ======== カレンダー ========
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth();

  function getNextSeiten(date) {
    const age = getMoonAge(date);
    const targets = [
      { name:'つきたち', age: 0 },
      { name:'かたみに', age: SYNODIC_MONTH * 0.25 },
      { name:'くまなし', age: SYNODIC_MONTH * 0.5 },
      { name:'ありあけ', age: SYNODIC_MONTH * 0.75 },
      { name:'つきたち', age: SYNODIC_MONTH }
    ];
    for (const t of targets) {
      if (t.age > age + 0.01) {
        const days = t.age - age;
        return { name: t.name, date: new Date(date.getTime() + days * 86400000), days };
      }
    }
    return { name:'つきたち', date: new Date(date.getTime() + (SYNODIC_MONTH - age) * 86400000), days: SYNODIC_MONTH - age };
  }

  function updateCalendarView() {
    const now = new Date();
    const age = getMoonAge(now);
    const phase = getPhaseName(age);
    const wd = ['日','月','火','水','木','金','土'];
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    document.getElementById('calTodayDate').textContent =
      `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()} · ${wd[now.getDay()]}`;
    document.getElementById('calTodayAge').textContent = age.toFixed(1);
    document.getElementById('calTodayPhase').textContent = phase.jp;
    applyMoonShadow(document.getElementById('todayMoonShadow'), age / SYNODIC_MONTH);
    const next = getNextSeiten(now);
    document.getElementById('nextSeitenName').textContent = next.name;
    const d = Math.floor(next.days);
    const h = Math.floor((next.days - d) * 24);
    document.getElementById('nextSeitenTime').textContent =
      `${next.date.getMonth() + 1}月${next.date.getDate()}日 · あと ${d}日 ${h}時間`;
    renderCal(calYear, calMonth);
  }

  function renderCal(year, month) {
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const monthNames = ['睦月','如月','弥生','卯月','皐月','水無月',
                        '文月','葉月','長月','神無月','霜月','師走'];
    document.getElementById('calMonthTitle').textContent =
      `${year}年 ${month + 1}月 · ${monthNames[month]}`;
    ['日','月','火','水','木','金','土'].forEach(w => {
      const el = document.createElement('div');
      el.className = 'cal-weekday';
      el.textContent = w;
      grid.appendChild(el);
    });
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const startWd = new Date(year, month, 1).getDay();
    const today = new Date();
    for (let i = 0; i < startWd; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const cellDate = new Date(year, month, d, 12, 0, 0);
      const age = getMoonAge(cellDate);
      const phase = getPhaseName(age);
      const el = document.createElement('div');
      el.className = 'cal-day';
      if (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) {
        el.classList.add('today');
      }
      if (phase.key) el.classList.add('seiten-day');
      const num = document.createElement('div');
      num.className = 'cal-day-num';
      num.textContent = d;
      el.appendChild(num);
      const moon = document.createElement('div');
      moon.className = 'cal-moon-icon';
      moon.innerHTML = '<div class="cal-moon-icon-lit"></div><div class="cal-moon-icon-shadow"></div>';
      el.appendChild(moon);
      applyMoonShadow(moon.querySelector('.cal-moon-icon-shadow'), age / SYNODIC_MONTH);
      if (phase.key) {
        const mark = document.createElement('div');
        mark.className = 'cal-seiten-mark';
        mark.textContent = '✦';
        el.appendChild(mark);
      }
      grid.appendChild(el);
    }
  }

  document.getElementById('prevMonth').addEventListener('click', () => {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCal(calYear, calMonth);
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCal(calYear, calMonth);
  });

  // ======== リサイズ ========
  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);
  resize();

  // ======== アニメーションループ ========
  const clock = new THREE.Clock();
  const RESONANCE_INTERVAL = 4.5;

  function animate() {
    requestAnimationFrame(animate);
    const now = clock.getElapsedTime();

    // グリッド共振
    if (now - state.lastResonanceTime > RESONANCE_INTERVAL) {
      spawnResonance(now);
      state.lastResonanceTime = now;
    }
    updateResonances(now);

    // 地球本体は停止（月・太陽との関係を正確に保つ）
    // ユーザーのドラッグでearthGroup全体を回転
    earthGroup.rotation.y = state.userRotY;
    earthGroup.rotation.x = state.userRotX;

    // 電離層グリッドだけはゆっくり自転（生命感）
    ionoGroup.rotation.y += 0.0008;
    ionoGroup.rotation.x = Math.sin(now * 0.05) * 0.05;

    // 那覇ハローのパルス
    const pulse = 0.85 + Math.sin(now * 2.5) * 0.15;
    nahaHaloMat.opacity = pulse;
    nahaHalo.scale.setScalar(0.18 + Math.sin(now * 1.8) * 0.03);
    pillarMat.opacity = 0.5 + Math.sin(now * 2) * 0.2;

    // 月ハロー微アニメ
    moonHaloMat.opacity = 0.35 + Math.sin(now * 0.8) * 0.08;

    // 太陽ハロー微アニメ（脈動）
    sunHaloMat.opacity = 0.7 + Math.sin(now * 1.2) * 0.12;
    sunFlareMat.opacity = 0.28 + Math.sin(now * 0.6) * 0.06;

    // カメラズーム補間
    state.currentZoom += (state.targetZoom - state.currentZoom) * 0.08;
    camera.position.z = state.currentZoom;

    renderer.render(scene, camera);
  }

  // 初期化
  updateData();
  updateCalendarView();

  // 初期カメラ視点を月が見える方向に
  // 月の位置は絶対座標で決まっているので、その方向を画面中央右寄りに持ってくる
  (function setInitialView() {
    const mp = moonGroup.position;
    const moonAzimuth = Math.atan2(mp.x, mp.z);
    // earthGroup全体を回転させて月を画面奥から少し右寄りに
    state.userRotY = -moonAzimuth - Math.PI / 5;
    // 月の高度に応じて少し見下ろす/見上げる
    const moonAltitude = Math.atan2(mp.y, Math.sqrt(mp.x * mp.x + mp.z * mp.z));
    state.userRotX = -moonAltitude * 0.4;
    // 地球と月が両方画面に収まるように引く
    state.targetZoom = 5.8;
    state.currentZoom = 5.8;
  })();

  animate();

  // 1分ごとに位置更新
  setInterval(updateData, 60000);

  // 5秒後に回転ヒントをフェードアウト（操作しなくても）
  setTimeout(() => {
    state.hintShown = false;
    document.getElementById('rotHint').classList.add('hidden');
  }, 8000);
</script>
